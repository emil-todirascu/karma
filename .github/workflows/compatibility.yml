name: Compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  leaflet:
    name: Leaflet compatibility
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout karma-maintained
        uses: actions/checkout@v6
        with:
          path: karma-maintained

      - name: Checkout Leaflet
        uses: actions/checkout@v6
        with:
          repository: Leaflet/Leaflet
          path: leaflet

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          check-latest: true
          cache: npm
          cache-dependency-path: |
            karma-maintained/package-lock.json
            leaflet/package-lock.json

      - name: Set up Google Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Pack karma-maintained
        working-directory: karma-maintained
        run: |
          mkdir -p "$RUNNER_TEMP/karma-pack"
          npm pack --pack-destination "$RUNNER_TEMP/karma-pack"

      - name: Install Leaflet dependencies
        working-directory: leaflet
        run: npm ci

      - name: Replace Leaflet's installed karma
        run: |
          package_tarball="$(find "$RUNNER_TEMP/karma-pack" -maxdepth 1 -name '*.tgz' -print -quit)"

          if [[ -z "$package_tarball" ]]; then
            echo "Expected npm pack to create a tarball in $RUNNER_TEMP/karma-pack" >&2
            exit 1
          fi

          chmod +x karma-maintained/scripts/replace-installed-karma.sh
          karma-maintained/scripts/replace-installed-karma.sh "$GITHUB_WORKSPACE/leaflet" "$package_tarball"

      - name: Run Leaflet Karma specs
        working-directory: leaflet
        run: npm test -- --single-run --browsers Chrome
